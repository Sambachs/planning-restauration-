{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h1>➕ Nouvelle demande de congé</h1>
        <a href="{{ url_for('absences.index') }}" class="btn">⬅️ Retour</a>
    </div>

    <div class="form-container">
        <form method="POST" action="{{ url_for('absences.add') }}">
            <div class="form-group">
                <label>Type d'absence</label>
                <select name="type_absence" required>
                    <option value="conge">Congé payé</option>
                    <option value="maladie">Arrêt maladie</option>
                    <option value="absence">Absence imprévue</option>
                    <option value="autre">Autre</option>
                </select>
            </div>

            <div class="form-group">
                <label>Date de début</label>
                <input type="date" name="date_debut" required>
            </div>

            <div class="form-group">
                <label>Date de fin</label>
                <input type="date" name="date_fin" required>
            </div>

            <div class="form-group">
                <label>Motif (optionnel)</label>
                <textarea name="motif" placeholder="Décrivez le motif de votre absence..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary">✅ Envoyer la demande</button>
        </form>
    </div>
</div>
{% endblock %}
