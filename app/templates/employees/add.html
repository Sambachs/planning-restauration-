{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h1>➕ Ajouter un employé</h1>
        <a href="{{ url_for('employees.index') }}" class="btn">⬅️ Retour</a>
    </div>

    <div class="form-container">
        <form method="POST" action="{{ url_for('employees.add') }}">
            <div class="form-group">
                <label>Prénom</label>
                <input type="text" name="prenom" placeholder="Jean" required>
            </div>

            <div class="form-group">
                <label>Nom</label>
                <input type="text" name="nom" placeholder="Dupont" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="jean@resto.fr" required>
            </div>

            <div class="form-group">
                <label>Téléphone</label>
                <input type="text" name="telephone" placeholder="06 00 00 00 00">
            </div>

            <div class="form-group">
                <label>Type de contrat</label>
                <select name="type_contrat">
                    <option value="CDI">CDI</option>
                    <option value="CDD">CDD</option>
                    <option value="Extra">Extra</option>
                    <option value="Alternance">Alternance</option>
                </select>
            </div>

            <div class="form-group">
                <label>Rôle</label>
                <select name="role">
                    <option value="employe">Employé</option>
                    <option value="manager">Manager</option>
                </select>
            </div>

            <div class="form-info">
                💡 Le mot de passe par défaut sera : <strong>password123</strong>
            </div>

            <button type="submit" class="btn btn-primary">✅ Ajouter l'employé</button>
        </form>
    </div>
</div>
{% endblock %}
