{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h1>➕ Ajouter un créneau</h1>
        <a href="{{ url_for('shifts.index') }}" class="btn">⬅️ Retour</a>
    </div>

    <div class="form-container">
        <form method="POST" action="{{ url_for('shifts.add') }}">
            <div class="form-group">
                <label>Employé</label>
                <select name="user_id" required>
                    <option value="">-- Choisir un employé --</option>
                    {% for employe in employes %}
                        <option value="{{ employe.id }}">{{ employe.prenom }} {{ employe.nom }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Poste</label>
                <select name="post_id" required>
                    <option value="">-- Choisir un poste --</option>
                    {% for poste in postes %}
                        <option value="{{ poste.id }}">{{ poste.nom }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" required>
            </div>

            <div class="form-group">
                <label>Heure de début</label>
                <input type="time" name="heure_debut" required>
            </div>

            <div class="form-group">
                <label>Heure de fin</label>
                <input type="time" name="heure_fin" required>
            </div>

            <button type="submit" class="btn btn-primary">✅ Ajouter le créneau</button>
        </form>
    </div>
</div>
{% endblock %}
